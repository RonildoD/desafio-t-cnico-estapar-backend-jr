# Configuração de testes: banco H2 em memória (não exige MySQL para o build passar)
spring.datasource.url=jdbc:h2:mem:estapar_test;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Evita que o sync de startup tente alcançar o simulador durante os testes
simulator.url=http://localhost:0
