spring.application.name=desafio-tecnico-estapar-backend-jr
# Porta do Servidor
server.port=3003

# Configurações do Banco de Dados
spring.datasource.url=jdbc:mysql://localhost:3307/estapar_db?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configurações do JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# URL do simulador da garagem (porta 3000)
simulator.url=http://localhost:3000
